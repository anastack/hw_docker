<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>50</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>AGE</td>
    <td>50</td>
    <td>17.00</td>
    <td>25.00</td>
    <td>21.48</td>
  </tr>
  <tr>
    <td>GPA</td>
    <td>50</td>
    <td>3.14</td>
    <td>9.59</td>
    <td>5.85</td>
  </tr>
  <tr>
    <td>ATTENDANCE_RATE</td>
    <td>50</td>
    <td>33.00</td>
    <td>100.00</td>
    <td>67.42</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: MAJOR</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>Design</td><td>18</td></tr><tr><td>Business Informatics</td><td>17</td></tr><tr><td>Economics</td><td>9</td></tr><tr><td>Computer Science</td><td>6</td></tr></tbody>
  </table>
</body>
</html>
